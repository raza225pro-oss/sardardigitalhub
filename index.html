                <img id="custom-logo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;position:relative;z-index:2;" onerror="document.getElementById('splash-icon').style.display='';this.style.display='none';">
            </div>
        </div>
        <div class="splash-title"><span class="splash-title-line">SARDAR</span><span class="splash-title-line">DIGITAL HUB</span></div>
        <div class="splash-bar-container">
            <div class="splash-bar" id="splash-bar"></div>
        </div>
        <div class="splash-percent" id="splash-percent">0%</div>
        <div class="splash-status" id="splash-status">AUTHENTICATING DATABASE...</div>
    </div>

    <!-- PUBLIC ACCESS / KEY LOGIN -->
    <div id="view-access" class="hidden"></div>

    <!-- FORCE JOIN -->
    <div id="view-forcejoin" class="hidden"></div>

    <!-- MAIN DASHBOARD -->
    <div id="view-main" class="hidden">
        <div class="dash-header">
            <div>
                <div class="dash-brand">Sardar Digital Hub</div>
                <div class="dash-user" id="dash-user">Public Guest</div>
            </div>
            <div class="dash-secure"><i class="fa-solid fa-shield-halved"></i> Secure</div>
        </div>
        <div class="dash-search">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search..." oninput="App.filterItems(this.value)">
            </div>
        </div>
        <div class="dash-content" id="dash-content"></div>
        <div class="bottom-nav">
            <div class="nav-item active" onclick="App.switchTab('tools',this)"><i class="fa-solid fa-code"></i>Tools</div>
            <div class="nav-item" onclick="App.switchTab('apks',this)"><i class="fa-brands fa-android"></i>APKs</div>
            <div class="nav-item" onclick="App.switchTab('courses',this)"><i class="fa-solid fa-graduation-cap"></i>Courses</div>
            <div class="nav-item" onclick="App.switchTab('profile',this)"><i class="fa-solid fa-user"></i>Profile</div>
            <div class="nav-item" onclick="App.switchTab('premium',this)"><i class="fa-solid fa-crown"></i>Premium</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB1kCkq4ia8PzF4-i9k3MWi5sqYDAuJz9I",
    authDomain: "aqibtoolkit.firebaseapp.com",
    databaseURL: "https://aqibtoolkit-default-rtdb.firebaseio.com",
    projectId: "aqibtoolkit",
    storageBucket: "aqibtoolkit.firebasestorage.app",
    messagingSenderId: "79873458827",
    appId: "1:79873458827:web:a2c98a998212e433e30a8e",
    measurementId: "G-ZB6W48V3CR"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const auth = firebase.auth();

const h = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

const App = {
    state: { admin:{}, keys:[], tools:[], links:[], courses:[], premiumConfig:{}, premiumContent:[] },
    currentTab: 'tools',
    sessionKey: 'rv_session',
    fjSessionKey: 'rv_fj_verified',
    premiumSessionKey: 'rv_premium_access',
    _dataReady: false,
    _signingIn: false,

    currentUser: null,
    authSupported: window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1',

    init() {
        if (this.authSupported) this.initAuth();
        document.getElementById('dash-content').addEventListener('click', (e) => {
            const link = e.target.closest('[data-link-url]');
            if (link) { window.open(link.dataset.linkUrl, '_blank'); return; }
            const course = e.target.closest('[data-course-url]');
            if (course) { window.open(course.dataset.courseUrl, '_blank'); return; }
            const tool = e.target.closest('[data-tool-id]');
            if (tool) { this.openTool(tool.dataset.toolId); return; }
        });
        const cachedLogo = localStorage.getItem('rv_logo_cache');
        if (cachedLogo) {
            const customLogo = document.getElementById('custom-logo');
            customLogo.src = cachedLogo;
            customLogo.style.display = 'block';
            document.getElementById('splash-icon').style.display = 'none';
        }
        this.runSplash();
    },

    toast(msg, type='success') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast ' + type;
        const icon = type === 'success' ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>';
        t.innerHTML = icon + '<span>' + msg + '</span>';
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    },

    runSplash() {
        const bar = document.getElementById('splash-bar');
        const status = document.getElementById('splash-status');
        const percent = document.getElementById('splash-percent');
        const msgs = ['AUTHENTICATING DATABASE...', 'LOADING SECURE MODULES...', 'VERIFYING ACCESS...', 'INITIALIZING VAULT...'];
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress > 100) progress = 100;
            const displayProgress = Math.round(progress);
            bar.style.width = displayProgress + '%';
            percent.textContent = displayProgress + '%';
            status.textContent = msgs[Math.min(Math.floor(progress / 25), msgs.length - 1)];
            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => this.connectFirebase(), 400);
            }
        }, 300);
    },

    connectFirebase(retries=3) {
        if (retries <= 0) {
            document.getElementById('splash-status').textContent = 'CONNECTION FAILED. REFRESH TO RETRY.';
            this.toast('Could not connect to server','error');
            return;
        }
        database.ref('/').once('value', (snap) => {
            const data = snap.val();
            if (!data || !data.admin) {
                document.getElementById('splash-status').textContent = 'CONFIGURING DATABASE...';
                const defaults = {
                    admin: { user:'admin', pass:'admin', waLink:'', keySystemActive:true, forceJoin:{ active:true, telegram:'', whatsapp:'', note:'Join our official channel to unlock the tools and get latest updates!' } },
                    keys: [{ id:'k_master', key:'darkmasterub', name:'Master Access', limit:0, uses:0, expiry:'', active:true, tools:['all'] }],
                    tools: [], links: [], courses: [], logs: []
                };
                database.ref('/').set(defaults).then(() => {
                    database.ref('/').once('value', (snap2) => {
                        this.onDataReady(snap2.val());
                    });
                });
                return;
            }
            this.onDataReady(data);
        }, () => {
            document.getElementById('splash-status').textContent = 'CONNECTION FAILED. RETRYING (' + retries + ' left)...';
            setTimeout(() => this.connectFirebase(retries - 1), 2000);
        });
    },

    onDataReady(data) {
        this.state.admin = data.admin || {};
        this.state.keys = data.keys || [];
        this.state.tools = data.tools || [];
        this.state.links = data.links || [];
        this.state.courses = data.courses || [];
        this.state.premiumConfig = data.premiumConfig || {};
        this.state.premiumContent = data.premiumContent || [];
        if (!this.state.admin.forceJoin) this.state.admin.forceJoin = { active:true, telegram:'', whatsapp:'', note:'' };

        // Force-enable forceJoin if no links configured yet (admin hasn't explicitly configured it)
        const fj = this.state.admin.forceJoin;
        const hasLinks = (fj.telegram && fj.telegram.trim()) || (fj.whatsapp && fj.whatsapp.trim());
        if (fj.active === false && !hasLinks) {
            fj.active = true;
            database.ref('admin/forceJoin/active').set(true);
        }

        // Set custom logo
        const logo = this.state.admin.logo;
        const customLogo = document.getElementById('custom-logo');
        const splashIcon = document.getElementById('splash-icon');
        if(logo){
            customLogo.src=logo;
            customLogo.style.display='block';
            splashIcon.style.display='none';
            try{localStorage.setItem('rv_logo_cache',logo);}catch(e){}
        } else {
            customLogo.style.display='none';
            splashIcon.style.display='';
            try{localStorage.removeItem('rv_logo_cache');}catch(e){}
        }

        this._dataReady = true;
        setTimeout(() => {
            document.getElementById('splash').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                this.handleRouting();
            }, 600);
        }, 500);
    },

    handleRouting() {
        if (this.currentUser && !sessionStorage.getItem(this.sessionKey)) {
            sessionStorage.setItem(this.sessionKey, JSON.stringify({
                key: 'FIREBASE_AUTH',
                name: this.currentUser.displayName || this.currentUser.email || 'Firebase User',
                type: 'firebase',
                uid: this.currentUser.uid,
                _t: Date.now()
            }));
        }
        if (sessionStorage.getItem(this.sessionKey)) {
            if (this.state.admin.forceJoin && this.state.admin.forceJoin.active && !sessionStorage.getItem(this.fjSessionKey)) {
                this.showForceJoin();
                return;
            }
            this.showMain();
            return;
        }
        this.showAccessScreen();
    },

    showAccessScreen() {
        const el = document.getElementById('view-access');
        el.classList.remove('hidden');

        // If already signed in, just show continue
        if (this.currentUser) {
            el.innerHTML = `
                <div class="access-card" style="border-color:var(--cyan);padding:30px 24px;">
                    <div class="access-icon cyan"><i class="fa-solid fa-vault"></i></div>
                    <div class="access-title gradient-text">VAULT ACCESS</div>
                    <div class="access-sub">Signed in as ${h(this.currentUser.email || this.currentUser.displayName || 'User')}</div>
                    <button class="btn-guest" onclick="App.continueAsGuest()" style="background:linear-gradient(135deg, var(--green), var(--gold));margin-top:10px;"><i class="fa-solid fa-arrow-right"></i> CONTINUE</button>
                    <button class="btn-verify" onclick="App.signOutUser()" style="margin-top:10px;"><i class="fa-solid fa-sign-out-alt"></i> SIGN OUT</button>
                </div>
            `;
            return;
        }

        let waHtml = '';
        if (this.state.admin.waLink) {
            const waUrl = this.state.admin.waLink;
            if (waUrl.startsWith('http://') || waUrl.startsWith('https://') || waUrl.startsWith('whatsapp://')) {
                waHtml = '<a href="'+h(waUrl)+'" target="_blank" style="display:block;margin-top:15px;color:var(--green);font-size:13px;text-decoration:none;"><i class="fa-brands fa-whatsapp"></i> Contact for Access</a>';
            }
        }
        const keyActive = this.state.admin.keySystemActive !== false;
        el.innerHTML = `
            <div class="access-card" style="border-color:var(--cyan);padding:30px 24px;">
                <div class="access-icon cyan"><i class="fa-solid fa-vault"></i></div>
                <div class="access-title gradient-text">VAULT ACCESS</div>
                <div class="access-sub">Sign in to continue</div>

                ${this.authSupported ? `
                <!-- Firebase Auth Buttons -->
                <button class="btn-guest" onclick="App.signInWithGoogle()" style="background:#fff;color:#333;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--font-body);"><svg viewBox="0 0 48 48" style="width:20px;height:20px;"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google</button>

                <div style="display:flex;gap:8px;margin-bottom:12px;">
                    <button class="btn-guest" onclick="App.showEmailAuth('signup')" style="flex:1;background:linear-gradient(135deg, var(--green), var(--cyan));font-size:12px;padding:12px;"><i class="fa-solid fa-user-plus"></i> Sign Up</button>
                    <button class="btn-guest" onclick="App.showEmailAuth('signin')" style="flex:1;background:linear-gradient(135deg, var(--cyan), var(--gold));font-size:12px;padding:12px;"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
                </div>
                ` : '<div style="padding:8px 12px;margin-bottom:12px;background:rgba(255,215,64,0.08);border:1px solid rgba(255,215,64,0.2);border-radius:10px;font-size:11px;color:var(--gold);text-align:center;"><i class="fa-solid fa-circle-info"></i> Deploy on Vercel to enable Google/Email sign-in</div>'}

                ${true ? `` : ''}

                ${keyActive ? `
                <form onsubmit="App.keyLogin(event)" style="width:100%;">
                    <input type="text" id="key-input" placeholder="Enter Passkey" autocapitalize="off" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:#fff;padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:10px;font-family:var(--font-body);outline:none;text-align:center;">
                    <button type="submit" class="btn-guest" style="background:linear-gradient(135deg, var(--cyan), var(--green));font-size:12px;padding:12px;">UNLOCK WITH KEY</button>
                </form>
                ` : ''}
                <button class="btn-guest" onclick="App.continueAsGuest()" style="margin-top:8px;font-size:12px;padding:12px;width:100%;"><i class="fa-solid fa-user"></i> CONTINUE AS GUEST</button>
                ${waHtml}
            </div>
        `;
    },

    keyLogin(e) {
        e.preventDefault();
        const inputKey = document.getElementById('key-input').value.trim();
        const keyData = this.state.keys.find(k => k.key === inputKey && k.active);
        if (!keyData) { this.toast('Invalid or inactive passkey', 'error'); return; }
        if (keyData.expiry && new Date(keyData.expiry) < new Date()) { this.toast('This passkey has expired', 'error'); return; }

        // Atomic usage counter via transaction
        const keyIndex = this.state.keys.indexOf(keyData);
        const usesRef = database.ref('keys/' + keyIndex + '/uses');
        usesRef.transaction(current => {
            const count = (current || 0) + 1;
            if (keyData.limit > 0 && count > keyData.limit) return;
            return count;
        }, (error, committed, snapshot) => {
            if (error) { this.toast('Key usage error', 'error'); return; }
            if (!committed) { this.toast('Passkey usage limit reached', 'error'); return; }
            const newCount = snapshot.val();
            keyData.uses = newCount;
            sessionStorage.setItem(this.sessionKey, JSON.stringify({ key: inputKey, name: keyData.name, type: 'key', _t: Date.now() }));
            this.showMain();
        });
    },

    continueAsGuest() {
        if (this.state.admin.forceJoin && this.state.admin.forceJoin.active && !sessionStorage.getItem(this.fjSessionKey)) {
            this.showForceJoin();
        } else {
            sessionStorage.setItem(this.sessionKey, JSON.stringify({ key: 'GUEST_MODE', name: 'Public Guest', type: 'guest', _t: Date.now() }));
            this.showMain();
        }
    },

    initAuth() {
        try {
            auth.onAuthStateChanged((user) => {
                this.currentUser = user;
                if (user) {
                    database.ref('users/' + user.uid).once('value', (snap) => {
                        if (!snap.exists()) {
                            database.ref('users/' + user.uid).set({
                                uid: user.uid,
                                email: user.email,
                                displayName: user.displayName || user.email,
                                photoURL: user.photoURL || '',
                                createdAt: firebase.database.ServerValue.TIMESTAMP,
                                lastLogin: firebase.database.ServerValue.TIMESTAMP
                            });
                        } else {
                            database.ref('users/' + user.uid + '/lastLogin').set(firebase.database.ServerValue.TIMESTAMP);
                        }
                    });
                    sessionStorage.setItem(this.sessionKey, JSON.stringify({
                        key: 'FIREBASE_AUTH',
                        name: user.displayName || user.email || 'Firebase User',
                        type: 'firebase',
                        uid: user.uid,
                        _t: Date.now()
                    }));
                    if (!this._dataReady) return;
                    const mainVisible = document.getElementById('view-main').classList.contains('hidden') === false;
                    if (!mainVisible && !sessionStorage.getItem(this.fjSessionKey)) {
                        this.handleRouting();
                    }
                }
            });
        } catch(e) { console.warn('Firebase Auth not available:', e.message); }
    },

    signInWithGoogle() {
        if (!this.authSupported) { this.toast('Auth requires http/https (deploy first)','error'); return; }
        if (this._signingIn) return;
        this._signingIn = true;
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then(() => {
            this._signingIn = false;
            this.toast('Signed in with Google');
        }).catch((err) => {
            this._signingIn = false;
            this.toast(err.message || 'Google sign-in failed', 'error');
        });
    },

    showEmailAuth(mode) {
        const el = document.getElementById('view-access');
        el.innerHTML = `
            <div class="access-card" style="border-color:var(--green);max-width:400px;">
                <div class="access-icon" style="color:var(--green);"><i class="fa-solid fa-envelope"></i></div>
                <div class="access-title" style="color:var(--green);">${mode === 'signup' ? 'CREATE ACCOUNT' : 'SIGN IN'}</div>
                <div class="access-sub" style="margin-bottom:18px;">${mode === 'signup' ? 'Register with your email' : 'Sign in to your account'}</div>
                <form onsubmit="App.submitEmailAuth(event, '${mode}')" style="width:100%;">
                    <input type="email" id="auth-email" placeholder="Email Address" required style="width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:#fff;padding:14px 16px;border-radius:12px;font-size:14px;margin-bottom:12px;font-family:var(--font-body);outline:none;text-align:center;">
                    <input type="password" id="auth-password" placeholder="Password (min 6 chars)" required minlength="6" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:#fff;padding:14px 16px;border-radius:12px;font-size:14px;margin-bottom:12px;font-family:var(--font-body);outline:none;text-align:center;">
                    <button type="submit" class="btn-guest" style="background:linear-gradient(135deg, var(--green), var(--cyan));"><i class="fa-solid fa-${mode === 'signup' ? 'user-plus' : 'right-to-bracket'}"></i> ${mode === 'signup' ? 'CREATE ACCOUNT' : 'SIGN IN'}</button>
                </form>
                <button class="btn-verify" onclick="App.showAccessScreen()" style="margin-top:12px;"><i class="fa-solid fa-arrow-left"></i> Back</button>
            </div>
        `;
    },

    submitEmailAuth(e, mode) {
        e.preventDefault();
        if (!this.authSupported) { this.toast('Auth requires http/https (deploy first)','error'); return; }
        const email = document.getElementById('auth-email').value.trim();
        const password = document.getElementById('auth-password').value;
        if (!email || !password) { this.toast('Fill all fields','error'); return; }
        if (password.length < 6) { this.toast('Password must be at least 6 characters','error'); return; }
        if (mode === 'signup') {
            auth.createUserWithEmailAndPassword(email, password).then(() => {
                this.toast('Account created! Welcome.');
            }).catch((err) => {
                this.toast(err.message || 'Sign up failed', 'error');
            });
        } else {
            auth.signInWithEmailAndPassword(email, password).then(() => {
                this.toast('Signed in successfully');
            }).catch((err) => {
                this.toast(err.message || 'Sign in failed', 'error');
            });
        }
    },

    signOutUser() {
        if (!this.authSupported) { this.toast('Auth requires http/https (deploy first)','error'); return; }
        if (this._premiumUserRef) { this._premiumUserRef.off(); this._premiumUserRef = null; }
        this.tgClicked = false;
        this.waClicked = false;
        auth.signOut().then(() => {
            this.currentUser = null;
            sessionStorage.removeItem(this.sessionKey);
            sessionStorage.removeItem(this.fjSessionKey);
            sessionStorage.removeItem(this.premiumSessionKey);
            this.toast('Signed out');
        }).catch((err) => {
            this.toast('Sign out failed', 'error');
        });
    },

    showForceJoin() {
        document.getElementById('view-access').classList.add('hidden');
        const el = document.getElementById('view-forcejoin');
        el.classList.remove('hidden');
        const fj = this.state.admin.forceJoin;
        const note = h(fj.note || 'Join our official channel to unlock the tools and get latest updates!');
        const hasTg = fj.telegram && fj.telegram.trim().length > 0;
        const hasWa = fj.whatsapp && fj.whatsapp.trim().length > 0;

        let tgBtn = '', waBtn = '';
        if (hasTg) {
            tgBtn = '<a href="'+h(fj.telegram)+'" target="_blank" class="btn-telegram" id="btn-tg" onclick="App.markTgClicked()"><i class="fa-brands fa-telegram"></i> Join Telegram</a>';
        }
        if (hasWa) {
            waBtn = '<a href="'+h(fj.whatsapp)+'" target="_blank" class="btn-whatsapp" id="btn-wa" onclick="App.markWaClicked()"><i class="fa-brands fa-whatsapp"></i> Join WhatsApp</a>';
        }

        let verifyBtn = '';
        if (hasTg || hasWa) {
            verifyBtn = '<button class="btn-verify" id="btn-verify-status" onclick="App.verifyForceJoin()">Verify Join Status</button>';
        } else {
            verifyBtn = '<button class="btn-verify" disabled style="opacity:0.5;cursor:not-allowed;">No Links Configured - Contact Admin</button>';
        }

        el.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100%;padding:20px;">
                <div class="access-card locked" style="max-width:420px;width:100%;">
                    <div class="access-icon red"><i class="fa-solid fa-lock"></i></div>
                    <div class="access-title" style="color:var(--text);">Verification Required</div>
                    <div class="access-desc-box">${note}</div>
                    ${tgBtn}
                    ${waBtn}
                    ${verifyBtn}
                </div>
            </div>
        `;
    },

    tgClicked: false,
    waClicked: false,

    markTgClicked() {
        this.tgClicked = true;
        document.getElementById('btn-tg').classList.add('verified');
        document.getElementById('btn-tg').innerHTML = '<i class="fa-solid fa-circle-check"></i> Verified';
        document.getElementById('btn-tg').onclick = null;
        this.checkForceJoinComplete();
    },
    markWaClicked() {
        this.waClicked = true;
        document.getElementById('btn-wa').classList.add('verified');
        document.getElementById('btn-wa').innerHTML = '<i class="fa-solid fa-circle-check"></i> Verified';
        document.getElementById('btn-wa').onclick = null;
        this.checkForceJoinComplete();
    },

    checkForceJoinComplete() {
        const fj = this.state.admin.forceJoin;
        const hasTg = fj.telegram && fj.telegram.trim().length > 0;
        const hasWa = fj.whatsapp && fj.whatsapp.trim().length > 0;
        if ((hasTg && !this.tgClicked) || (hasWa && !this.waClicked)) return;
        const btn = document.getElementById('btn-verify-status');
        if (btn) {
            btn.className = 'btn-enter-vault';
            btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> CONTINUE';
            btn.onclick = () => this.enterVault();
        }
    },

    verifyForceJoin() {
        const fj = this.state.admin.forceJoin;
        const hasTg = fj.telegram && fj.telegram.trim().length > 0;
        const hasWa = fj.whatsapp && fj.whatsapp.trim().length > 0;

        // If no links configured - block access, show contact admin
        if (!hasTg && !hasWa) {
            this.toast('Force Join not configured. Contact admin.', 'error');
            return;
        }
        // Need to click ALL configured links
        if ((hasTg && !this.tgClicked) || (hasWa && !this.waClicked)) {
            this.toast('Please click all channel links first', 'error');
            return;
        }
        this.showForceJoinVerified();
    },

    showForceJoinVerified() {
        const el = document.getElementById('view-forcejoin');
        const fj = this.state.admin.forceJoin;
        const note = h(fj.note || 'Join our official channel to unlock the tools and get latest updates!');
        const hasTg = fj.telegram && fj.telegram.trim().length > 0;
        const hasWa = fj.whatsapp && fj.whatsapp.trim().length > 0;

        let tgBtn = '', waBtn = '';
        if (hasTg) {
            tgBtn = '<div class="btn-telegram verified"><i class="fa-solid fa-circle-check"></i> Verified</div>';
        }
        if (hasWa) {
            waBtn = '<div class="btn-whatsapp verified"><i class="fa-solid fa-circle-check"></i> Verified</div>';
        }

        el.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100%;padding:20px;">
                <div class="access-card locked" style="max-width:420px;width:100%;">
                    <div class="access-icon red"><i class="fa-solid fa-lock"></i></div>
                    <div class="access-title" style="color:var(--text);">Verification Required</div>
                    <div class="access-desc-box">${note}</div>
                    ${tgBtn}
                    ${waBtn}
                    <button class="btn-enter-vault" onclick="App.enterVault()">Enter Vault Now</button>
                </div>
            </div>
        `;
    },

    enterVault() {
        sessionStorage.setItem(this.fjSessionKey, 'true');
        if (!this.currentUser) {
            sessionStorage.setItem(this.sessionKey, JSON.stringify({ key: 'GUEST_MODE', name: 'Public Guest', type: 'guest', _t: Date.now() }));
        }
        this.showMain();
    },

    showMain() {
        let session;
        try { session = JSON.parse(sessionStorage.getItem(this.sessionKey) || '{}'); } catch(e) { session = {}; }
        // Validate session format (prevents console injection)
        if (!session.type || !session._t || isNaN(session._t) || Date.now() - session._t > 86400000) {
            sessionStorage.removeItem(this.sessionKey);
            sessionStorage.removeItem(this.fjSessionKey);
            this.handleRouting();
            return;
        }
        // Defense: if guest and force join active but not verified, redirect to force join
        if (session.type !== 'key' && this.state.admin.forceJoin && this.state.admin.forceJoin.active && !sessionStorage.getItem(this.fjSessionKey)) {
            this.showForceJoin();
            return;
        }
        document.getElementById('view-access').classList.add('hidden');
        document.getElementById('view-forcejoin').classList.add('hidden');
        const main = document.getElementById('view-main');
        main.classList.remove('hidden');

        document.getElementById('dash-user').textContent = session.name || 'Public Guest';

        this.switchTab('tools');
    },

    switchTab(tab, el) {
        this.currentTab = tab;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if (el) el.classList.add('active');
        document.getElementById('search-input').value = '';
        this.renderContent();
    },

    filterItems(query) {
        this.renderContent(query.toLowerCase());
    },

    renderContent(query='') {
        const content = document.getElementById('dash-content');
        if (this.currentTab === 'tools') {
            let tools = this.state.tools.filter(t => t.active);
            if (query) tools = tools.filter(t => t.name.toLowerCase().includes(query));

            if (!tools.length) {
                content.innerHTML = '<div class="section-title">HTML MODULES</div><div class="empty-state"><i class="fa-solid fa-code"></i><span>No HTML tools assigned.</span></div>';
            } else {
                content.innerHTML = '<div class="section-title">HTML MODULES</div>' + tools.map(t => {
                    const icon = t.iconType === 'img' && t.iconData ? '<img src="'+h(t.iconData)+'" style="width:100%;height:100%;object-fit:cover;">' : '<i class="'+(t.icon||'fa-solid fa-cube')+'" style="color:var(--cyan);"></i>';
                    return '<div class="list-item-card" data-tool-id="'+h(t.id)+'" style="background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;"><div style="width:44px;height:44px;border-radius:12px;background:rgba(0,240,255,0.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+icon+'</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;">'+h(t.name)+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:3px;">HTML Tool</div></div><i class="fa-solid fa-chevron-right" style="color:var(--text-muted);font-size:12px;"></i></div>';
                }).join('');
            }
        } else if (this.currentTab === 'apks') {
            let links = this.state.links.filter(l => l.active);
            if (query) links = links.filter(l => l.name.toLowerCase().includes(query));

            if (!links.length) {
                content.innerHTML = '<div class="section-title">APKS & WEB APPS</div><div class="empty-state"><i class="fa-brands fa-android"></i><span>No APK links assigned.</span></div>';
            } else {
                content.innerHTML = '<div class="section-title">APKS & WEB APPS</div><div class="apk-grid">' + links.map(l => {
                    const icon = l.iconType === 'img' && l.iconData ? '<img src="'+h(l.iconData)+'">' : '<i class="'+(l.icon||'fa-brands fa-android')+'" style="color:var(--gold);"></i>';
                    return '<div class="apk-card" data-link-url="'+h(l.url)+'"><div class="apk-badge">APK/APP</div><div class="apk-icon">'+icon+'</div><div class="apk-name">'+h(l.name)+'</div></div>';
                }).join('') + '</div>';
            }
        } else if (this.currentTab === 'courses') {
            let courses = this.state.courses.filter(c => c.active);
            if (query) courses = courses.filter(c => c.name.toLowerCase().includes(query));

            if (!courses.length) {
                content.innerHTML = '<div class="section-title">LEARNING HUB</div><div class="empty-state"><i class="fa-solid fa-graduation-cap"></i><span>No courses available yet.</span></div>';
            } else {
                content.innerHTML = '<div class="section-title">LEARNING HUB</div>' + courses.map(c => {
                    const poster = c.posterData ? '<img src="'+h(c.posterData)+'" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">' : '<i class="fa-solid fa-graduation-cap" style="color:var(--cyan);font-size:1.2rem;"></i>';
                    const desc = c.description ? (c.description.length>50?c.description.substring(0,50)+'...':c.description) : '';
                    return '<div class="list-item-card" data-course-url="'+h(c.url)+'" style="background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;"><div style="width:56px;height:40px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+poster+'</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;">'+h(c.name)+'</div>'+(desc?'<div style="font-size:11px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+h(desc)+'</div>':'')+'<div style="font-size:11px;color:var(--text-muted);margin-top:3px;">'+h((c.format||'Course').toUpperCase())+'</div></div><i class="fa-solid fa-chevron-right" style="color:var(--text-muted);font-size:12px;"></i></div>';
                }).join('');
            }
        } else if (this.currentTab === 'profile') {
            let session = {};
        try { session = JSON.parse(sessionStorage.getItem(this.sessionKey) || '{}'); } catch(e) {}
            const keyName = h(session.key || 'GUEST_MODE');
            const userName = h(session.name || 'Public Guest');
            const isFirebase = session.type === 'firebase' && this.currentUser;
            const userEmail = this.currentUser ? h(this.currentUser.email || '') : '';
            const userPhoto = this.currentUser && this.currentUser.photoURL ? this.currentUser.photoURL : '';
            const photoHtml = userPhoto ? '<img src="'+h(userPhoto)+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--cyan);">' : '<i class="fa-solid fa-user" style="font-size:2rem;color:var(--cyan);"></i>';

            content.innerHTML = `
                <div class="profile-section">
                    <div class="profile-avatar" style="overflow:hidden;">${photoHtml}</div>
                    <div class="profile-name">${userName}</div>
                    ${isFirebase ? '<div style="font-size:12px;color:var(--text-muted);margin-bottom:6px;">'+userEmail+'</div>' : ''}
                    <div class="profile-badge">${isFirebase ? 'FIREBASE AUTH' : 'ACTIVE SESSION'}</div>
                </div>
                <div class="hash-card">
                    <div class="hash-title"><i class="fa-solid fa-circle"></i> SECURITY HASH</div>
                    <div class="hash-row"><span class="hash-label">Session Token</span><span class="hash-value">${keyName}</span></div>
                    <div class="hash-row"><span class="hash-label">Session Type</span><span class="hash-value">${h(session.type || 'guest')}</span></div>
                </div>
                ${isFirebase ? '<button class="btn-terminate" onclick="App.signOutUser()" style="border-color:rgba(255,69,58,0.3);color:var(--red);"><i class="fa-solid fa-sign-out-alt"></i> Sign Out</button>' : '<button class="btn-terminate" onclick="App.terminateSession()"><i class="fa-solid fa-power-off"></i> Terminate Session Securely</button>'}
            `;
        } else if (this.currentTab === 'premium') {
            this.renderPremiumContent();
        }
    },

    renderPremiumContent() {
        const content = document.getElementById('dash-content');
        const isFirebaseUser = this.currentUser && this.currentUser.uid;

        if (isFirebaseUser) {
            content.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;margin-bottom:15px;"></i><div>Checking access...</div></div>';
            // Remove old listener if any
            if (this._premiumUserRef) { this._premiumUserRef.off(); }
            this._premiumUserRef = database.ref('premiumUsers/' + this.currentUser.uid);
            this._premiumUserRef.on('value', (snap) => {
                const premiumAccess = snap.val();
                if (premiumAccess && premiumAccess.active) {
                    this.showPremiumItems(content);
                } else {
                    let premiumData = null;
                    try { premiumData = JSON.parse(sessionStorage.getItem(this.premiumSessionKey) || 'null'); } catch(e) {}
                    if (premiumData && premiumData.requestId) {
                        database.ref('premiumRequests').once('value', (snap2) => {
                            const requests = snap2.val() || [];
                            const req = requests.find(r => r.id === premiumData.requestId);
                            if (req && req.status === 'approved') {
                                sessionStorage.removeItem(this.premiumSessionKey);
                                this.toast('Premium access approved!');
                            } else if (req && req.status === 'denied') {
                                sessionStorage.removeItem(this.premiumSessionKey);
                                this.toast('Payment request was denied','error');
                            } else {
                                this.showPremiumPayment(content, true);
                            }
                        });
                    } else {
                        this.showPremiumPayment(content, false);
                    }
                }
            });
        } else {
            // Guest - show sign-in prompt
            content.innerHTML = `
                <div class="section-title">PREMIUM VAULT</div>
                <div class="empty-state"><i class="fa-solid fa-crown" style="color:var(--gold);"></i><span>Sign in with Google or Email to purchase premium access.</span></div>
            `;
        }
    },

    showPremiumItems(content) {
        const items = this.state.premiumContent.filter(c => c.active);
        if (!items.length) {
            content.innerHTML = '<div class="section-title">PREMIUM VAULT</div><div class="empty-state"><i class="fa-solid fa-crown" style="color:var(--gold);"></i><span>No premium content available yet.</span></div>';
        } else {
            content.innerHTML = '<div class="section-title">PREMIUM VAULT</div>' + items.map(c => {
                const icon = c.iconType === 'img' && c.iconData ? '<img src="'+h(c.iconData)+'" style="width:100%;height:100%;object-fit:cover;">' : '<i class="'+(c.icon||'fa-solid fa-cube')+'" style="color:var(--gold);"></i>';
                const typeMap = { course:'fa-solid fa-graduation-cap', apk:'fa-brands fa-android', video:'fa-solid fa-video', image:'fa-solid fa-image', zip:'fa-solid fa-file-zipper' };
                const typeLabels = { course:'Course', apk:'APK', video:'Video', image:'Image', zip:'ZIP Archive' };
                return '<div class="list-item-card" onclick="window.open(\''+h(c.url)+'\',\'_blank\')" style="background:var(--card);border:1px solid var(--gold);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:0 0 15px rgba(255,215,64,0.08);"><div style="width:44px;height:44px;border-radius:12px;background:rgba(255,215,64,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+icon+'</div><div style="flex:1;"><div style="font-weight:600;font-size:14px;color:var(--gold);">'+h(c.name)+'</div><div style="font-size:11px;color:var(--text-muted);margin-top:3px;">'+h(typeLabels[c.type]||c.type||'Content')+'</div></div><i class="fa-solid fa-chevron-right" style="color:var(--gold);font-size:12px;"></i></div>';
            }).join('');
        }
    },

    showPremiumPayment(content, hasPending) {
        const cfg = this.state.premiumConfig;
        const bankName = h(cfg.bankName||'EasyPaisa');
        const account = h(cfg.accountNumber||'03238693440');
        const receiver = h(cfg.receiverName||'Receiver');
        const amount = cfg.amount||500;

        content.innerHTML = `
            <div class="section-title">PREMIUM ACCESS REQUIRED</div>
            <div style="background:var(--card);border:1px solid var(--gold);border-radius:20px;padding:24px 20px;text-align:center;margin-bottom:20px;box-shadow:0 0 30px rgba(255,215,64,0.1);">
                <i class="fa-solid fa-crown" style="font-size:3rem;color:var(--gold);margin-bottom:12px;"></i>
                <div style="font-family:var(--font);font-size:18px;font-weight:700;color:var(--gold);margin-bottom:6px;">Unlock Premium</div>
                <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">Get access to exclusive premium content</div>
            </div>

            ${hasPending ? '<div style="background:rgba(255,215,64,0.08);border:1px solid var(--gold);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center;font-size:13px;color:var(--gold);"><i class="fa-solid fa-clock"></i> Your payment request is pending. Wait for admin approval.</div>' : ''}

            <!-- Payment Option -->
            <div style="background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:20px;margin-bottom:16px;">
                <div style="font-weight:700;font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px;"><i class="fa-solid fa-building-columns" style="color:var(--green);"></i> Pay &amp; Request Access</div>
                <div style="background:rgba(255,215,64,0.08);border:1px solid rgba(255,215,64,0.2);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.7;">
                    <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text-muted);">Bank:</span><span style="font-weight:600;">${bankName}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text-muted);">Account:</span><span style="font-weight:600;font-family:monospace;">${account}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text-muted);">Receiver:</span><span style="font-weight:600;">${receiver}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid rgba(255,215,64,0.15);margin-top:6px;padding-top:8px;"><span style="color:var(--text-muted);">Amount:</span><span style="font-weight:700;color:var(--gold);font-size:16px;">Rs ${amount}</span></div>
                </div>
                <form onsubmit="App.submitPaymentRequest(event)" style="width:100%;">
                    <input type="tel" id="payment-whatsapp" placeholder="Your WhatsApp Number (e.g. 03XXXXXXXXX)" required style="width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:#fff;padding:14px 16px;border-radius:12px;font-size:14px;margin-bottom:12px;font-family:var(--font-body);outline:none;text-align:center;">
                    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;text-align:center;"><i class="fa-solid fa-camera"></i> Attach Payment Screenshot</div>
                    <input type="file" id="payment-screenshot" accept="image/*" required style="width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--card-border);color:#fff;padding:10px 16px;border-radius:12px;font-size:13px;margin-bottom:12px;font-family:var(--font-body);outline:none;">
                    <button type="submit" class="btn-guest" style="background:linear-gradient(135deg, var(--gold), var(--green));"><i class="fa-solid fa-paper-plane"></i> Send Payment Request</button>
                </form>
            </div>
            <div style="height:30px;"></div>
        `;
    },

    submitPaymentRequest(e) {
        e.preventDefault();
        if (!this.currentUser || !this.currentUser.uid) { this.toast('Sign in with Google or Email first','error'); return; }
        const whatsapp = document.getElementById('payment-whatsapp').value.trim();
        if (!whatsapp) { this.toast('Enter your WhatsApp number','error'); return; }
        const fileInput = document.getElementById('payment-screenshot');
        if (!fileInput.files || !fileInput.files[0]) { this.toast('Attach a payment screenshot','error'); return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
            const screenshot = ev.target.result;
            const id = 'pr_' + Math.random().toString(36).substr(2,9);
            const request = {
                id, whatsapp, screenshot,
                uid: this.currentUser ? this.currentUser.uid : '',
                email: this.currentUser ? this.currentUser.email : '',
                status: 'pending',
                time: new Date().toISOString()
            };
            database.ref('premiumRequests').transaction((current) => {
                const arr = current || [];
                arr.push(request);
                return arr;
            }, (error, committed) => {
                if (error || !committed) { this.toast('Failed to send request','error'); return; }
                sessionStorage.setItem(this.premiumSessionKey, JSON.stringify({ access: false, requestId: id }));
                this.toast('Payment request sent! Wait for admin approval.');
                this.renderPremiumContent();
            });
        };
        reader.onerror = () => { this.toast('Failed to read screenshot','error'); };
        reader.readAsDataURL(fileInput.files[0]);
    },

    openTool(id) {
        const tool = this.state.tools.find(t => t.id === id);
        if (!tool) return;
        const viewer = window.open('', '_blank');
        if (!viewer) { this.toast('Popup blocked — allow popups for this site','error'); return; }
        viewer.document.write(tool.html || '<h1>No content</h1>');
        viewer.document.close();
    },

    terminateSession() {
        sessionStorage.removeItem(this.sessionKey);
        sessionStorage.removeItem(this.fjSessionKey);
        sessionStorage.removeItem(this.premiumSessionKey);
        this.tgClicked = false;
        this.waClicked = false;
        document.getElementById('view-main').classList.add('hidden');
        document.getElementById('view-access').classList.add('hidden');
        document.getElementById('view-forcejoin').classList.add('hidden');
        try { if (auth) auth.signOut(); } catch(e) {}
        this.currentUser = null;
        this.handleRouting();
        this.toast('Session terminated');
    }
};

App.init();
</script>
</body>
</html>
